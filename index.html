<!doctype html>
<!-- 语言设置为英文 -->
<html lang="en">
  <head>
    <!-- 字符编码设置 -->
    <meta charset="UTF-8" />
    <!-- 网站图标 -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- 视口设置，响应式布局必需 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 全局样式表 -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- 网站描述（与 src/config.js 中 metaData 保持一致） -->
    <meta name="description" content="欢迎来到忘川渡客的奇妙世界！">
    <!-- 网站关键词（与 src/config.js 中 metaData 保持一致） -->
    <meta name="keywords" content="忘川渡客,个人主页,个人网站">
    <!-- 网站标题（Vue 启动后会被 config.js 覆盖，这里作为初始值） -->
    <title>忘川渡客的个人主页🎉</title>
  </head>
  <body>
    <!-- Vue 应用挂载节点 -->
    <div id="app"></div>
    <!-- Vue 应用入口脚本 -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
